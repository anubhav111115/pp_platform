version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: prepai-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    networks:
      - prepai-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: prepai-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://admin:password@mongodb:27017/prepai?authSource=admin
      JWT_SECRET: your-jwt-secret-change-in-production
      OPENAI_API_KEY: your-openai-api-key
      GOOGLE_CLIENT_ID: your-google-client-id
      GOOGLE_CLIENT_SECRET: your-google-client-secret
      GOOGLE_CALLBACK_URL: http://localhost:5000/api/auth/google/callback
    volumes:
      - ./server/uploads:/app/uploads
    depends_on:
      - mongodb
    networks:
      - prepai-network

volumes:
  mongodb_data:

networks:
  prepai-network:
    driver: bridge
